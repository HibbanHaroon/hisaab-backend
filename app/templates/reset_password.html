<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; margin: 0; padding: 0; }
        .container { max-width: 600px; margin: 40px auto; background: #ffffff; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .header { background-color: #FF5722; color: #ffffff; padding: 24px; text-align: center; }
        .header h1 { margin: 0; font-size: 24px; }
        .body { padding: 32px 24px; text-align: center; }
        .otp-code { font-size: 36px; font-weight: bold; color: #FF5722; letter-spacing: 8px; padding: 16px 0; }
        .footer { padding: 16px 24px; text-align: center; font-size: 12px; color: #999999; border-top: 1px solid #eeeeee; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Hisaab</h1>
        </div>
        <div class="body">
            <h2>Reset Your Password</h2>
            <p>Use the following one-time password to reset your password:</p>
            <div class="otp-code">{{ otp }}</div>
            <p>This code will expire in <strong>{{ expiry_minutes }}</strong> minutes.</p>
            <p>If you didn't request a password reset, please ignore this email.</p>
        </div>
        <div class="footer">
            <p>&copy; Hisaab. All rights reserved.</p>
        </div>
    </div>
</body>
</html>
